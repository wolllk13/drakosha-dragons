<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Troll Jump — Chakipaki</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Troll Jump">
<meta name="theme-color" content="#0d0a1f">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Fredoka',system-ui,sans-serif;background:#0d0a1f;color:#fff;}
#app{position:fixed;inset:0;}
canvas{display:block;width:100%;height:100%;background:#0d0a1f;}
#controls{position:fixed;left:0;right:0;bottom:0;height:30vh;max-height:200px;display:flex;justify-content:space-between;align-items:flex-end;padding:0 14px env(safe-area-inset-bottom) 14px;pointer-events:none;}
.pad{pointer-events:auto;border-radius:18px;display:flex;align-items:center;justify-content:center;user-select:none;touch-action:none;backdrop-filter:blur(2px);}
#move{width:42%;max-width:200px;height:80px;background:rgba(127,240,216,.10);border:1.5px solid rgba(127,240,216,.30);position:relative;overflow:hidden;}
#move .arrow{position:absolute;top:50%;transform:translateY(-50%);font-size:30px;color:rgba(127,240,216,.55);font-weight:700;}
#move .la{left:18px;} #move .ra{right:18px;}
#move .divider{position:absolute;top:18px;bottom:18px;left:50%;width:1px;background:rgba(127,240,216,.18);}
#jump{width:42%;max-width:160px;height:80px;background:rgba(255,138,168,.14);border:1.5px solid rgba(255,138,168,.4);color:#ffb3c6;font-size:17px;font-weight:700;letter-spacing:1px;}
.pad.active{filter:brightness(1.6);}
#faceBtn{position:fixed;left:50%;top:44%;transform:translateX(-50%);z-index:5;padding:11px 18px;font-family:inherit;font-size:15px;font-weight:600;color:#7ff0d8;background:rgba(127,240,216,.12);border:1.5px solid rgba(127,240,216,.4);border-radius:14px;cursor:pointer;backdrop-filter:blur(2px);}
#faceBtn:active{filter:brightness(1.5);}
#hint{position:fixed;left:0;right:0;bottom:calc(30vh + 6px);text-align:center;font-size:12px;color:rgba(255,255,255,.4);pointer-events:none;}
</style>
</head>
<body>
<div id="app"><canvas id="cv"></canvas></div>
<button id="faceBtn">📷 your face</button>
<input id="faceInput" type="file" accept="image/*" style="display:none">
<div id="hint">hold left pad ◀ ▶ to walk · tap JUMP</div>
<div id="controls">
  <div id="move" class="pad"><span class="arrow la">◀</span><span class="divider"></span><span class="arrow ra">▶</span></div>
  <div id="jump" class="pad">JUMP</div>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let W=360,H=640,GND=0,DPR=1;
const ZOOM=1.25; // приблизить всю игру на 25%
function fit(){
  DPR=Math.min(window.devicePixelRatio||1,2.5);
  const w=window.innerWidth,h=window.innerHeight;
  cv.width=Math.round(w*DPR);cv.height=Math.round(h*DPR);
  ctx.setTransform(DPR*ZOOM,0,0,DPR*ZOOM,0,0);
  W=w/ZOOM;H=h/ZOOM;GND=H*0.66;
}
window.addEventListener('resize',fit);window.addEventListener('orientationchange',()=>setTimeout(fit,200));

// ---- persistence ----
const KEY='trolljump:save';
let save={deaths:0,best:1};
try{const s=localStorage.getItem(KEY);if(s)save=JSON.parse(s);}catch(e){}
function persist(){try{localStorage.setItem(KEY,JSON.stringify(save));}catch(e){}}

// ---- custom face photo ----
const FACEKEY='trolljump:face';
let faceImg=null;
function faceReady(){return faceImg&&faceImg.complete&&faceImg.naturalWidth>0;}
(function(){try{const d=localStorage.getItem(FACEKEY);if(d){faceImg=new Image();faceImg.src=d;}}catch(e){}})();
function setFaceFromFile(file){
  if(!file)return;
  const rd=new FileReader();
  rd.onload=function(){
    const im=new Image();
    im.onload=function(){
      const S=150,oc=document.createElement('canvas');oc.width=S;oc.height=S;
      const o=oc.getContext('2d');
      const r=Math.min(im.width,im.height);
      o.drawImage(im,(im.width-r)/2,(im.height-r)/2,r,r,0,0,S,S);
      const data=oc.toDataURL('image/jpeg',0.85);
      try{localStorage.setItem(FACEKEY,data);}catch(e){}
      faceImg=new Image();faceImg.src=data;
    };
    im.src=rd.result;
  };
  rd.readAsDataURL(file);
}
document.getElementById('faceBtn').addEventListener('click',function(){document.getElementById('faceInput').click();});
document.getElementById('faceInput').addEventListener('change',function(e){setFaceFromFile(e.target.files&&e.target.files[0]);});

// ---- input ----
const key={l:false,r:false};
const moveEl=document.getElementById('move'),jumpEl=document.getElementById('jump');
function moveTouch(e){
  e.preventDefault();
  if(e.type==='pointerup'||e.type==='pointercancel'||e.type==='pointerleave'){key.l=key.r=false;moveEl.classList.remove('active');return;}
  const r=moveEl.getBoundingClientRect();
  const cx=(e.clientX!==undefined?e.clientX:r.left+r.width/2);
  const rel=(cx-r.left)/r.width;
  key.l=rel<0.5;key.r=rel>=0.5;
  moveEl.classList.add('active');
}
['pointerdown','pointermove','pointerup','pointercancel','pointerleave'].forEach(ev=>moveEl.addEventListener(ev,moveTouch));
function doJump(e){if(e){e.preventDefault();}jump();}
jumpEl.addEventListener('pointerdown',e=>{e.preventDefault();jumpEl.classList.add('active');jump();});
jumpEl.addEventListener('pointerup',e=>{e.preventDefault();jumpEl.classList.remove('active');});
jumpEl.addEventListener('pointercancel',()=>jumpEl.classList.remove('active'));
cv.addEventListener('pointerdown',e=>{e.preventDefault();if(state!=='play')jump();});
window.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')key.l=true;if(e.key==='ArrowRight')key.r=true;if(e.key===' '||e.key==='ArrowUp'){e.preventDefault();jump();}});
window.addEventListener('keyup',e=>{if(e.key==='ArrowLeft')key.l=false;if(e.key==='ArrowRight')key.r=false;});

// ---- game state ----
let state='menu',level=1,maxLevel=10;
let p,cam,traps,goalX,particles,tick,shakeT,banner,bannerT,chaser;
let caughtT=0;

function rng(seed){return function(){seed=(seed*9301+49297)%233280;return seed/233280;};}

function buildLevel(L){
  traps=[];
  const r=rng(L*7.3+11);
  goalX=760+L*90;
  let px=220;
  const types=['pit','spike','dropfloor','ceiling','fakewall'];
  while(px<goalX-130){
    let ty=types[Math.floor(r()*types.length)];
    traps.push({type:ty,x:px,trig:false,t:0});
    px+=120+r()*90;
  }
}
function spawn(){p={x:50,y:GND-22,vx:0,vy:0,onG:true,scared:0,dead:false,deadT:0,face:1,walk:0};cam=0;chaser={x:p.x-240,y:GND-15,walk:0};}
function startLevel(L,resetDeaths){
  level=L;if(resetDeaths)save.deaths=0;
  spawn();particles=[];tick=0;shakeT=0;banner='LEVEL '+L;bannerT=70;
  buildLevel(L);state='play';
}
function jump(){
  if(state==='menu'){startLevel(1,true);return;}
  if(state==='win'){let n=level+1;if(n>maxLevel)n=1;startLevel(n,false);return;}
  if(state==='caught'){startLevel(level,false);return;}
  if(p.dead)return;
  if(p.onG){p.vy=-9.2;p.onG=false;}
}
function die(){
  if(p.dead)return;
  p.dead=true;p.deadT=48;save.deaths++;shakeT=20;persist();
  for(let i=0;i<16;i++)particles.push({x:p.x,y:p.y,vx:(Math.random()-.5)*6,vy:-Math.random()*6-1,life:34,c:i%2?'#ffd76a':'#ff6b8a'});
}
function caughtByChaser(){
  if(state!=='play')return;
  save.deaths++;persist();shakeT=28;caughtT=0;state='caught';
  for(let i=0;i<26;i++)particles.push({x:p.x,y:p.y-10,vx:(Math.random()-.5)*8,vy:-Math.random()*7-1,life:40,c:i%2?'#ff5a7a':'#ffd0db'});
}

function update(){
  tick++;
  if(state!=='play'){if(shakeT>0)shakeT--;if(state==='caught')caughtT++;return;}
  if(bannerT>0)bannerT--;
  if(p.dead){
    p.deadT--;p.y+=4;p.vy=0;
    if(p.deadT<=0){spawn();traps.forEach(t=>{t.trig=false;t.t=0;});}
    return;
  }
  const sp=2.6;
  if(key.l){p.vx=-sp;p.face=-1;p.walk+=.35;}
  else if(key.r){p.vx=sp;p.face=1;p.walk+=.35;}
  else p.vx*=0.55;
  p.x+=p.vx;
  if(p.x<14)p.x=14;
  p.vy+=0.5;p.y+=p.vy;
  cam=Math.max(0,p.x-W*0.32);

  let onFloor=true;
  for(const tr of traps){
    const near=p.x>tr.x-64&&p.x<tr.x+64;
    if(near&&!tr.trig){tr.trig=true;tr.t=0;p.scared=18;}
    if(tr.trig)tr.t++;
    if(tr.type==='pit'){if(p.x>tr.x-26&&p.x<tr.x+26)onFloor=false;}
    else if(tr.type==='dropfloor'){if(p.x>tr.x-34&&p.x<tr.x+34&&tr.t>12)onFloor=false;}
    else if(tr.type==='spike'){const s=tr.trig&&tr.t>8?24:0;if(s>0&&p.x>tr.x-17&&p.x<tr.x+17&&p.y+15>GND-s)die();}
    else if(tr.type==='ceiling'){const ch=tr.trig&&tr.t>7?GND*0.42:0;if(ch>0&&p.x>tr.x-17&&p.x<tr.x+17&&p.y-15<ch)die();}
    else if(tr.type==='fakewall'){const wh=tr.trig&&tr.t>4?40:0;if(wh>0&&p.x>tr.x-6&&p.x<tr.x+18&&p.vx>0&&p.y>GND-44){p.x=tr.x-7;p.vx=0;}}
  }
  if(onFloor){
    if(p.y>=GND-15){
      if(!p.onG&&p.vy>3){for(let i=0;i<7;i++)particles.push({x:p.x+(Math.random()-.5)*14,y:GND-2,vx:(Math.random()-.5)*3,vy:-Math.random()*2,life:20,c:'rgba(190,160,180,0.5)'});}
      p.y=GND-15;p.vy=0;p.onG=true;
    } else p.onG=false;
  }
  else{p.onG=false;if(p.y-15>H+40)die();}
  // running dust
  if(p.onG&&Math.abs(p.vx)>1.4&&tick%4===0)particles.push({x:p.x-p.face*7,y:GND-2,vx:-p.face*1.1+(Math.random()-.5),vy:-Math.random()*1.4,life:16,c:'rgba(180,150,170,0.45)'});
  if(p.scared>0)p.scared--;

  // chaser — runs in from behind and catches up
  if(chaser){
    const chSpeed=2.0+level*0.05;
    chaser.x+=chSpeed;chaser.walk+=0.4;
    if(p.x-chaser.x<60)p.scared=Math.max(p.scared,6);
    if(chaser.x>p.x-12)caughtByChaser();
  }

  if(p.x>goalX){state='win';if(level>=save.best)save.best=level;persist();
    for(let k=0;k<30;k++)particles.push({x:p.x,y:p.y,vx:(Math.random()-.5)*8,vy:-Math.random()*8-2,life:50,c:k%3===0?'#5fe0c0':k%3===1?'#ffd76a':'#ff8ad1'});}
  for(let j=particles.length-1;j>=0;j--){const a=particles[j];a.x+=a.vx;a.y+=a.vy;a.vy+=.32;a.life--;if(a.life<=0)particles.splice(j,1);}
  if(shakeT>0)shakeT--;
}

function guy(gx,gy,sc,dead,face,walk,onG){
  if(!dead){ctx.save();ctx.fillStyle='rgba(0,0,0,0.30)';ctx.beginPath();ctx.ellipse(gx,GND+1,10,3,0,0,7);ctx.fill();ctx.restore();}
  ctx.save();ctx.translate(gx,gy);
  if(dead){ctx.rotate(Math.PI);sc=18;}
  ctx.strokeStyle='#cfe8ff';ctx.lineWidth=3.4;ctx.lineCap='round';
  const lift1=onG?Math.max(0,Math.sin(walk))*6:5, lift2=onG?Math.max(0,-Math.sin(walk))*6:5;
  ctx.beginPath();ctx.moveTo(0,7);ctx.lineTo(-5,15-lift1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,7);ctx.lineTo(5,15-lift2);ctx.stroke();
  const as=onG?Math.sin(walk)*5:-8;
  ctx.beginPath();ctx.moveTo(0,-2);ctx.lineTo(-8,5+(sc?-12:as));ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-2);ctx.lineTo(8,5+(sc?-12:-as));ctx.stroke();
  ctx.strokeStyle='#9fd0ff';ctx.beginPath();ctx.moveTo(0,-2);ctx.lineTo(0,8);ctx.stroke();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,-12,12,0,7);ctx.fill();
  if(faceReady()){
    ctx.save();
    ctx.beginPath();ctx.arc(0,-12,11,0,7);ctx.clip();
    ctx.drawImage(faceImg,-12,-24,24,24);
    ctx.restore();
    ctx.lineWidth=1.4;ctx.strokeStyle='#cfe8ff';ctx.beginPath();ctx.arc(0,-12,11.4,0,7);ctx.stroke();
  } else {
  ctx.fillStyle='#0d0a1f';
  const es=sc?6:3.6;
  ctx.beginPath();ctx.arc(-4,-13,es,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(4,-13,es,0,7);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(-4+face*0.9,-14,1.6,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(4+face*0.9,-14,1.6,0,7);ctx.fill();
  ctx.fillStyle='#0d0a1f';
  if(sc){ctx.beginPath();ctx.arc(0,-5,3.4,0,7);ctx.fill();}
  else{ctx.strokeStyle='#0d0a1f';ctx.lineWidth=1.6;ctx.beginPath();ctx.arc(0,-6,3.2,0.15,Math.PI-0.15);ctx.stroke();}
  ctx.fillStyle='#ff9ec4';
  ctx.beginPath();ctx.arc(-8,-8,2.3,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(8,-8,2.3,0,7);ctx.fill();
  }
  ctx.restore();
}

function chaserDraw(cx,cy,walk){
  ctx.save();ctx.translate(cx,cy);
  // tail in front (leaning toward the prey)
  ctx.strokeStyle='#ff5a7a';ctx.lineWidth=4;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(8,3);ctx.quadraticCurveTo(22,Math.sin(walk)*5,17,-13);ctx.stroke();
  // legs
  ctx.strokeStyle='#c0364f';ctx.lineWidth=3.6;
  const cl1=Math.max(0,Math.sin(walk))*6, cl2=Math.max(0,-Math.sin(walk))*6;
  ctx.beginPath();ctx.moveTo(-3,7);ctx.lineTo(-3,15-cl1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(3,7);ctx.lineTo(3,15-cl2);ctx.stroke();
  // body
  ctx.fillStyle='#ff5a7a';ctx.beginPath();ctx.ellipse(0,-2,11,13,0,0,7);ctx.fill();
  ctx.fillStyle='#ffd0db';ctx.beginPath();ctx.ellipse(-1,3,5,7,0,0,7);ctx.fill();
  // angry eyes
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-4,-6,3.6,0,7);ctx.fill();ctx.beginPath();ctx.arc(4,-6,3.6,0,7);ctx.fill();
  ctx.fillStyle='#0d0a1f';ctx.beginPath();ctx.arc(-3,-6,1.9,0,7);ctx.fill();ctx.beginPath();ctx.arc(5,-6,1.9,0,7);ctx.fill();
  ctx.strokeStyle='#7a1226';ctx.lineWidth=2.2;
  ctx.beginPath();ctx.moveTo(-8,-11);ctx.lineTo(-1,-8);ctx.stroke();
  ctx.beginPath();ctx.moveTo(8,-11);ctx.lineTo(1,-8);ctx.stroke();
  // snarl
  ctx.fillStyle='#0d0a1f';ctx.beginPath();ctx.arc(0,2,2.8,0,7);ctx.fill();
  ctx.restore();
}
function floorTopY(x){return GND-2+Math.sin((x+cam)*0.07)*2.5+Math.sin((x+cam)*0.021)*3.2;}
function drawCaveBg(){
  // dark cave gradient
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#241327');g.addColorStop(0.55,'#150c1c');g.addColorStop(1,'#090510');
  ctx.fillStyle=g;ctx.fillRect(-20,-20,W+40,H+40);
  // far wall streaks (slow parallax)
  for(let i=0;i<24;i++){let x=((i*73-cam*0.15)%(W+80));if(x<-40)x+=W+80;const h=(i*53)%(GND*0.5)+GND*0.12;ctx.fillStyle='rgba(58,38,66,0.45)';ctx.fillRect(x-40,0,26,h);}
  // hanging stalactites
  for(let i=0;i<14;i++){let x=((i*120-cam*0.4)%(W+160));if(x<-80)x+=W+160;const len=22+(i*37)%56;ctx.fillStyle='#190f1d';ctx.beginPath();ctx.moveTo(x-12,-2);ctx.lineTo(x+12,-2);ctx.lineTo(x,len);ctx.closePath();ctx.fill();}
  // flickering wall torches with warm glow
  for(let i=0;i<6;i++){let x=((i*220-cam*0.4)%(W+260));if(x<-130)x+=W+260;const y=GND*0.42;const fl=0.62+0.38*Math.sin(tick*0.3+i*2);
    const rg=ctx.createRadialGradient(x,y,2,x,y,76);rg.addColorStop(0,'rgba(255,160,60,'+(0.42*fl)+')');rg.addColorStop(1,'rgba(255,140,40,0)');ctx.fillStyle=rg;ctx.beginPath();ctx.arc(x,y,76,0,7);ctx.fill();
    ctx.fillStyle='#3a2740';ctx.fillRect(x-2,y,4,18);
    ctx.fillStyle='#ffb347';ctx.beginPath();ctx.ellipse(x,y-4,5,9*fl,0,0,7);ctx.fill();
    ctx.fillStyle='#fff0b0';ctx.beginPath();ctx.ellipse(x,y-2,2.2,5*fl,0,0,7);ctx.fill();}
  // drifting fog
  for(let i=0;i<5;i++){let x=((i*150-cam*0.25-tick*0.3)%(W+220));if(x<-110)x+=W+220;const y=GND-44-((i*57)%80);ctx.fillStyle='rgba(120,90,130,0.05)';ctx.beginPath();ctx.ellipse(x,y,92,26,0,0,7);ctx.fill();}
  // floating dust motes
  for(let i=0;i<24;i++){let x=((i*89-cam*0.5)%W);if(x<0)x+=W;let y=((i*53+tick*0.4)%(GND-20));ctx.fillStyle='rgba(255,200,120,'+(0.05+(i%3)*0.03)+')';ctx.fillRect(x,y,2,2);}
  // ceiling water drips
  for(let i=0;i<4;i++){const ph=(tick+i*41)%140;let x=((i*200-cam*0.4)%(W+120));if(x<-60)x+=W+120;ctx.fillStyle='rgba(150,200,220,0.5)';ctx.fillRect(x,ph/140*GND,1.6,6);}
}
function drawCaveFloor(){
  ctx.beginPath();ctx.moveTo(0,H);
  for(let x=0;x<=W;x+=10)ctx.lineTo(x,floorTopY(x));
  ctx.lineTo(W,H);ctx.closePath();
  const g=ctx.createLinearGradient(0,GND-6,0,H);g.addColorStop(0,'#3a2740');g.addColorStop(0.5,'#241526');g.addColorStop(1,'#120a14');ctx.fillStyle=g;ctx.fill();
  // warm rim light from torches
  ctx.strokeStyle='rgba(255,150,60,0.5)';ctx.lineWidth=2;ctx.beginPath();for(let x=0;x<=W;x+=10){const y=floorTopY(x);if(x===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}ctx.stroke();
  // rocky speckles
  for(let i=0;i<26;i++){let x=((i*61-cam)%W);if(x<0)x+=W;const y=GND+12+((i*43)%(H-GND-16));ctx.fillStyle='rgba(0,0,0,0.18)';ctx.fillRect(x,y,3,3);}
}
function vignette(){
  const rg=ctx.createRadialGradient(W/2,H*0.48,H*0.28,W/2,H*0.5,H*0.78);
  rg.addColorStop(0,'rgba(0,0,0,0)');rg.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);
}
function draw(){
  const sx=shakeT>0?(Math.random()-.5)*shakeT*.7:0, sy=shakeT>0?(Math.random()-.5)*shakeT*.7:0;
  ctx.save();ctx.translate(sx,sy);
  drawCaveBg();

  if(state==='menu'){
    drawCaveFloor();
    guy(W/2,GND-15,0,false,1,0,true);
    vignette();
    ctx.textAlign='center';ctx.fillStyle='#fff';ctx.font='700 34px Fredoka,sans-serif';
    ctx.fillText('TROLL JUMP',W/2,H*0.30);
    ctx.font='500 15px Fredoka,sans-serif';ctx.fillStyle='#b9b2d8';
    ctx.fillText('walk to the flag. if you can.',W/2,H*0.30+30);
    if(save.best>1){ctx.fillStyle='#7ff0d8';ctx.font='600 14px Fredoka,sans-serif';ctx.fillText('best: level '+save.best+'  ·  💀 '+save.deaths,W/2,H*0.30+58);}
    ctx.fillStyle='#ffd76a';ctx.font='600 17px Fredoka,sans-serif';
    ctx.fillText('tap to start',W/2,GND-70);
    ctx.restore();return;
  }

  // floor
  drawCaveFloor();

  for(const tr of traps){
    const rx=tr.x-cam;if(rx<-70||rx>W+70)continue;
    if(tr.type==='pit'){ctx.fillStyle='#0d0a1f';ctx.fillRect(rx-26,GND,52,H-GND);}
    else if(tr.type==='dropfloor'){
      if(!(tr.trig&&tr.t>12)){ctx.fillStyle=tr.trig?'#8a4ab0':'#3a2d6a';ctx.fillRect(rx-34,GND,68,7);}
      else{ctx.fillStyle='#0d0a1f';ctx.fillRect(rx-34,GND,68,H-GND);}
    }
    else if(tr.type==='spike'){
      const s=tr.trig&&tr.t>8?24:0;
      if(s>0){ctx.fillStyle='#ff5a7a';for(let q=-14;q<16;q+=8){ctx.beginPath();ctx.moveTo(rx+q,GND);ctx.lineTo(rx+q+4,GND-s);ctx.lineTo(rx+q+8,GND);ctx.fill();}}
      else{ctx.fillStyle='#3a2d6a';ctx.fillRect(rx-15,GND-2,30,2);}
    }
    else if(tr.type==='ceiling'){
      const ch=tr.trig&&tr.t>7?GND*0.42:0;
      if(ch>0){ctx.fillStyle='#7a2238';ctx.fillRect(rx-17,0,34,ch);ctx.fillStyle='#ff5a7a';for(let w=-14;w<16;w+=8){ctx.beginPath();ctx.moveTo(rx+w,ch);ctx.lineTo(rx+w+4,ch+15);ctx.lineTo(rx+w+8,ch);ctx.fill();}}
    }
    else if(tr.type==='fakewall'){
      const wh=tr.trig&&tr.t>4?40:0;
      if(wh>0){ctx.fillStyle='#6a4a9a';ctx.fillRect(rx-6,GND-44,12,44);}
    }
  }
  // goal — glowing cave exit with waving flag
  const gx=goalX-cam;
  if(gx<W+60&&gx>-40){
    const rg=ctx.createRadialGradient(gx,GND-26,4,gx,GND-26,64);rg.addColorStop(0,'rgba(95,224,192,0.34)');rg.addColorStop(1,'rgba(95,224,192,0)');ctx.fillStyle=rg;ctx.beginPath();ctx.arc(gx,GND-26,64,0,7);ctx.fill();
    ctx.fillStyle='#5fe0c0';ctx.fillRect(gx,GND-50,4,50);
    const wv=Math.sin(tick*0.2)*3;
    ctx.beginPath();ctx.moveTo(gx+4,GND-50);ctx.quadraticCurveTo(gx+16,GND-46+wv,gx+24,GND-42);ctx.quadraticCurveTo(gx+16,GND-40-wv,gx+4,GND-34);ctx.closePath();ctx.fill();
  }

  for(const a of particles){ctx.globalAlpha=Math.max(0,a.life/45);ctx.fillStyle=a.c;ctx.fillRect(a.x-cam-2,a.y-2,4,4);}
  ctx.globalAlpha=1;

  if((state==='play'||state==='caught')&&chaser)chaserDraw(chaser.x-cam,chaser.y,chaser.walk);

  if(state!=='win'||tick%6<4)guy(p.x-cam,p.y,p.scared,p.dead,p.face,p.walk,p.onG);

  vignette();

  // hud
  ctx.textAlign='left';ctx.fillStyle='#fff';ctx.font='600 16px Fredoka,sans-serif';
  ctx.fillText('Level '+level,14,34);
  ctx.textAlign='right';ctx.fillStyle='#ff8aa8';ctx.fillText('💀 '+save.deaths,W-14,34);

  if(bannerT>0&&state==='play'){ctx.globalAlpha=Math.min(1,bannerT/30);ctx.textAlign='center';ctx.fillStyle='#7ff0d8';ctx.font='700 22px Fredoka,sans-serif';ctx.fillText(banner,W/2,H*0.24);ctx.globalAlpha=1;}

  if(state==='win'){
    ctx.fillStyle='rgba(13,10,31,.84)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';ctx.fillStyle='#5fe0c0';ctx.font='700 32px Fredoka,sans-serif';
    ctx.fillText('YOU MADE IT! 🎉',W/2,H/2-26);
    ctx.fillStyle='#fff';ctx.font='500 16px Fredoka,sans-serif';
    ctx.fillText('Level '+level+' cleared  ·  💀 '+save.deaths,W/2,H/2+4);
    ctx.fillStyle='#ffd76a';ctx.font='600 17px Fredoka,sans-serif';
    ctx.fillText('tap for next level',W/2,H/2+46);
  }

  if(state==='caught'){
    ctx.fillStyle='rgba(13,10,31,.9)';ctx.fillRect(0,0,W,H);
    const g=Math.min(1,caughtT/12), R=Math.min(W,H)*0.2375*g+5, cx=W/2, cy=H*0.38;
    const jx=caughtT<14?(Math.random()-.5)*7*(1-g):0, jy=caughtT<14?(Math.random()-.5)*7*(1-g):0;
    ctx.save();ctx.beginPath();ctx.arc(cx+jx,cy+jy,R,0,7);ctx.clip();
    if(faceReady()){ctx.drawImage(faceImg,cx+jx-R,cy+jy-R,R*2,R*2);}
    else{
      ctx.fillStyle='#fff';ctx.fillRect(cx-R,cy-R,R*2,R*2);
      ctx.fillStyle='#0d0a1f';
      ctx.beginPath();ctx.arc(cx-R*0.34,cy-R*0.12,R*0.17,0,7);ctx.fill();
      ctx.beginPath();ctx.arc(cx+R*0.34,cy-R*0.12,R*0.17,0,7);ctx.fill();
      ctx.beginPath();ctx.ellipse(cx,cy+R*0.42,R*0.16,R*0.24,0,0,7);ctx.fill();
    }
    ctx.restore();
    ctx.lineWidth=4;ctx.strokeStyle='#ff5a7a';ctx.beginPath();ctx.arc(cx+jx,cy+jy,R,0,7);ctx.stroke();
    ctx.strokeStyle='#ffd76a';ctx.lineWidth=3;
    for(let a=0;a<8;a++){const an=a/8*Math.PI*2,r1=R+8,r2=R+8+12*g;ctx.beginPath();ctx.moveTo(cx+Math.cos(an)*r1,cy+Math.sin(an)*r1);ctx.lineTo(cx+Math.cos(an)*r2,cy+Math.sin(an)*r2);ctx.stroke();}
    ctx.textAlign='center';
    ctx.fillStyle='#ff5a7a';ctx.font='800 42px Fredoka,sans-serif';ctx.fillText('CAUGHT!',W/2,cy+R+56);
    ctx.fillStyle='#fff';ctx.font='500 16px Fredoka,sans-serif';ctx.fillText('the troll got you  ·  💀 '+save.deaths,W/2,cy+R+84);
    ctx.fillStyle='#ffd76a';ctx.font='600 17px Fredoka,sans-serif';
    if(caughtT%44<28)ctx.fillText('tap to run again',W/2,cy+R+120);
  }
  ctx.restore();
}

const faceBtnEl=document.getElementById('faceBtn');
function loop(){update();draw();faceBtnEl.style.display=(state==='menu')?'block':'none';requestAnimationFrame(loop);}
fit();spawn();traps=[];particles=[];tick=0;shakeT=0;banner='';bannerT=0;state='menu';
loop();
</script>
</body>
